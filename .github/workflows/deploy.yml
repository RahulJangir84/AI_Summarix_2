name: Deploy to AWS EC2

on:
  push:
    branches:
      - production

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint

      - name: Run Tests
        run: npm run test

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            NODE_BIN="/home/ubuntu/.nvm/versions/node/v24.18.0/bin"
            cd /home/ubuntu/AI_Summarix_2
            git checkout production
            git pull origin production
            $NODE_BIN/npm ci
            $NODE_BIN/npm run build
            $NODE_BIN/pm2 reload nextjs-app || $NODE_BIN/pm2 start $NODE_BIN/npm --name "nextjs-app" -- start
